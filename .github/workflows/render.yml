name: Render

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pre-commit hooks (prek)
        uses: j178/prek-action@v2
        with:
          # prose-lint is a local system hook (personal dotfiles script), absent on the runner.
          extra-args: --all-files --skip prose-lint

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::dplyr
            any::ggplot2
            any::palmerpenguins
            any::sessioninfo

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Lua unit tests
        run: quarto pandoc lua tests/run.lua

      - name: Lua type check (lua-language-server)
        run: |
          curl -sSL -o luals.tar.gz https://github.com/LuaLS/lua-language-server/releases/download/3.18.2/lua-language-server-3.18.2-linux-x64.tar.gz
          mkdir luals && tar -xzf luals.tar.gz -C luals
          luals/bin/lua-language-server --check . --checklevel Warning

      - name: Render example.qmd (HTML)
        run: quarto render example.qmd --to hebstr-doc-html

      - uses: actions/upload-artifact@v4
        with:
          name: example-html
          path: |
            example.html
            example_files/
          if-no-files-found: warn

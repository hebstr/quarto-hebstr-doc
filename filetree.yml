filetree:
  depth: 2
  paths:
    "_extensions": "the extension itself, as `quarto add` installs it"
    "_extensions/hebstr-doc": "formats, filters, SCSS themes and bundled fonts"
    "scripts": "R scripts the example injects with the `script` shortcode"
    "example.qmd": "feature showcase, rendered to example.html"
    "README.md": "installation, shortcodes and customization"
    "CHANGELOG.md": "versioned public API surface"
    "CONTRIBUTING.md": "versioning policy and release process"
    "LICENSE.md": "MIT"
  highlight:
    - "^README%.md$"
  exclude:
    - "%.html$"
    - "_files$"

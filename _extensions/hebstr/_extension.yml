title: hebstr
author: hebstr
version: 0.10.0
quarto-required: ">=1.8.0"
contributes:
  formats:
    common:
      number-sections: true
      number-depth: 4
      toc: true
      toc-depth: 4
      colorlinks: true
      default-image_extension: png
      crossref:
        title-delim: "\\."
        tbl-title: "Table"
      tbl-cap-location: top
      fig-cap-location: bottom
      callout-appearance: simple
      fig-align: center
      knitr:
        opts_chunk:
          collapse: true
          comment: "#>"
          echo: false
          message: false
          warning: false
    html:
      page-layout: full
      embed-resources: true
      date: last-modified
      toc-expand: true
      code-link: false
      code-fold: true
      code-copy: hover
      html-table-processing: none
      html-math-method: plain
      theme: theme.scss
      css: fonts/fonts.css
      lightbox: true
      grid:
        sidebar-width: 0px
        body-width: 1100px
        margin-width: 600px
        gutter-width: 3rem
    typst:
      mainfont: "Luciole"
      font-paths: fonts
      papersize: a4
      margin:
        x: 1.5cm
        y: 1.5cm
      keep-typ: false
      include-in-header: template.typ
    docx:
      reference-doc: chazard.dotx
      number-sections: false

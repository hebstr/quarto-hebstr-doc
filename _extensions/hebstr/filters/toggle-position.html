<script>
(function () {
  function moveToggle() {
    var toggle = document.querySelector('.quarto-color-scheme-toggle');
    var codeTools = document.getElementById('quarto-code-tools-menu')
      || document.getElementById('quarto-code-tools-source');
    if (!toggle || !codeTools || !codeTools.parentNode) return false;
    if (toggle.parentNode === codeTools.parentNode && toggle.nextSibling === codeTools) return true;
    toggle.classList.remove('top-right');
    toggle.classList.add('hebstr-inline-toggle');
    codeTools.parentNode.insertBefore(toggle, codeTools);
    return true;
  }
  function tryMove(retries) {
    if (moveToggle()) return;
    if (retries <= 0) return;
    requestAnimationFrame(function () { tryMove(retries - 1); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { tryMove(20); });
  } else {
    tryMove(20);
  }
})();
</script>

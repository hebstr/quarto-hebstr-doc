[[repos]]
repo = "local"
hooks = [
  { id = "prose-lint", name = "prose lint (.md/.qmd)", entry = "prose-lint", language = "system", files = '\.(md|qmd)$' },
]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-added-large-files", args = ["--maxkb=500"] },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
]

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
  { id = "gitleaks" }
]

[[repos]]
repo = "https://github.com/posit-dev/air-pre-commit"
rev = "0.10.0"
hooks = [
  { id = "air-format", files = '\.(R|r)$', exclude = '^tests/fixtures/' }
]

[[repos]]
repo = "https://github.com/etiennebacher/jarl-pre-commit"
rev = "0.5.0"
hooks = [
  { id = "jarl-check", files = '\.(R|r)$', exclude = '^tests/fixtures/' }
]

[[repos]]
repo = "https://github.com/typstyle-rs/pre-commit-typstyle"
rev = "v0.14.4"
hooks = [
  { id = "typstyle", args = ["-i", "-l", "100"] }
]

[[repos]]
repo = "https://github.com/JohnnyMorganz/StyLua"
rev = "v2.5.2"
hooks = [
  { id = "stylua-github", files = '\.lua$', args = ["--respect-ignores"] }
]
